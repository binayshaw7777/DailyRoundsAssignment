name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump version
        id: bump
        run: |
          # Read current version code from gradle.properties
          current_code=$(grep -oP 'VERSION_CODE=\K\d+' gradle.properties 2>/dev/null || echo "1")
          new_code=$((current_code + 1))

          # Generate new version name from date+run number
          version_name="1.${{ github.run_number }}"

          # Update gradle.properties
          sed -i "s/VERSION_CODE=.*/VERSION_CODE=$new_code/" gradle.properties
          sed -i "s/VERSION_NAME=.*/VERSION_NAME=$version_name/" gradle.properties

          echo "version_name=$version_name" >> $GITHUB_OUTPUT
          echo "version_code=$new_code" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK (if keystore provided)
        if: ${{ secrets.ANDROID_KEYSTORE != '' }}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/keystore.jks
          # Locate apksigner path dynamically
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          for apk in app/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] || continue
            $APKSIGNER sign --ks /tmp/keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$STORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" "$apk"
          done

      - name: Rename APK
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] || continue
            mv "$apk" "app/build/outputs/apk/release/DailyRoundsAssignment-${{ steps.bump.outputs.version_name }}.apk"
          done

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.bump.outputs.version_name }}
          name: "v${{ steps.bump.outputs.version_name }}"
          commit: ${{ github.sha }}
          artifacts: app/build/outputs/apk/release/DailyRoundsAssignment-*.apk
          generateReleaseNotes: true
          makeLatest: true
